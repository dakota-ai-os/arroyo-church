name: Generate weekly sermon blog draft

on:
  schedule:
    - cron: '0 17 * * 1'        # Mondays ~09:00 America/Los_Angeles (after Sunday's sermon)
  workflow_dispatch:            # manual run from the Actions tab

permissions:
  contents: write              # to commit the generated draft

concurrency:
  group: generate-blog
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: |
          python -m pip install --quiet yt-dlp
          npm install --no-save @anthropic-ai/sdk

      - name: Generate draft
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/generate-blog.mjs

      - name: Commit draft if new
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add blog-drafts/
          if git diff --staged --quiet; then
            echo "No new draft this run."
          else
            git commit -m "Add weekly sermon blog draft"
            git push
          fi
